version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s %(levelname)s %(name)s %(message)s"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout

loggers:
  traidr:
    level: INFO
    handlers:
      - console
    propagate: false

root:
  level: WARNING
  handlers:
    - console

safety:
  redact_secret_like_fields: true
  persist_private_keys: false
  persist_seed_phrases: false
